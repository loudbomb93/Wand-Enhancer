name: Build executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    permissions:
      contents: read

    steps:
      # 1. Bumped from v4 to v5
      - uses: actions/checkout@v5

      # 2. Bumped from v4 to v5 (keeps version 10 config)
      - uses: pnpm/action-setup@v5
        with:
          version: 10

      # 3. Bumped from v4 to v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-panel/pnpm-lock.yaml

      - name: Build unsigned executable
        shell: pwsh
        run: ./build.ps1 -Configuration Release

      # 4. Bumped from v4 to v5
      - name: Upload unsigned executable
        uses: actions/upload-artifact@v5
        with:
          name: WandEnhancer-unsigned
          path: WandEnhancer/bin/Release/WandEnhancer.exe
          if-no-files-found: error
